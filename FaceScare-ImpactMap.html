<style>

    margin: 0 auto;

  .tooltip {
    position: fixed;
    background: #333;
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: system-ui, sans-serif;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
    z-index: 100;
    line-height: 1.4;
  }
  .node-group { cursor: pointer; }
  .node-group:hover .node-shape { filter: brightness(1.08); }
  .connector {
    fill: none;
    stroke: #555;
    stroke-width: 3;
    stroke-linecap: round;
  }

<body>

<svg id="map"></svg>

            {

};

// ─── AUTO-LAYOUT (bottom-up width, top-down position) ───

const LEAF_WIDTH = 130;
const SIBLING_GAP = 18;
const Y_LEVELS = { goal: 60, actor: 200, impact: 350, deliverable: 510, us: 660 };
const HALF_HEIGHTS = { goal: 58, actor: 42, impact: 38, deliverable: 24, us: 26 };

// Pass 1: compute width of each subtree
function computeWidth(node) {
  if (!node.children || node.children.length === 0) {
    node._width = LEAF_WIDTH;
    return node._width;
  }
  let total = 0;
  node.children.forEach((child, i) => {
    total += computeWidth(child);
    if (i > 0) total += SIBLING_GAP;
  });
  node._width = Math.max(total, LEAF_WIDTH);
  return node._width;
}

// Pass 2: assign x positions given a center
function assignPositions(node, cx) {
  node._x = cx;
  node._y = Y_LEVELS[node.type];
  if (!node.children || node.children.length === 0) return;

  let totalW = 0;
  node.children.forEach((c, i) => { totalW += c._width; if (i > 0) totalW += SIBLING_GAP; });
  let startX = cx - totalW / 2;
  node.children.forEach(child => {
    const childCx = startX + child._width / 2;
    assignPositions(child, childCx);
    startX += child._width + SIBLING_GAP;
  });
}

computeWidth(tree);
assignPositions(tree, tree._width / 2 + 30);

// ─── DRAWING HELPERS ───

function jitter(base, range) {
  return base + (Math.random() - 0.5) * range;
}

function ellipsePath(cx, cy, rx, ry, points = 40) {
  let d = '';
  for (let i = 0; i <= points; i++) {
    const angle = (i / points) * Math.PI * 2;
    const jx = jitter(0, 2.5);
    const jy = jitter(0, 2.5);
    const px = cx + Math.cos(angle) * rx + jx;
    const py = cy + Math.sin(angle) * ry + jy;
    d += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1);
  }
  return d + 'Z';
}

function rectPath(x, y, w, h) {
  const j = () => jitter(0, 2);
  return `M${x+j()},${y+j()} L${x+w+j()},${y+j()} L${x+w+j()},${y+h+j()} L${x+j()},${y+h+j()} Z`;
}

function connectorPath(x1, y1, x2, y2) {
  const my = (y1 + y2) / 2;
  const j1 = jitter(0, 6);
  const j2 = jitter(0, 6);
  return `M${x1},${y1} C${x1+j1},${my+j2} ${x2-j1},${my-j2} ${x2},${y2}`;
}

function createText(x, y, text, fontSize, color) {
  const lines = text.split('\n');
  const g = document.createElementNS(NS, 'text');
  g.setAttribute('x', x);
  g.setAttribute('text-anchor', 'middle');
  g.setAttribute('fill', color);
  g.setAttribute('font-size', fontSize);
  g.setAttribute('font-family', "'Comic Sans MS', 'Marker Felt', cursive, sans-serif");
  g.setAttribute('font-weight', 'bold');
  const totalHeight = lines.length * (fontSize + 3);
  const startY = y - totalHeight / 2 + fontSize;
  lines.forEach((line, i) => {
    const tspan = document.createElementNS(NS, 'tspan');
    tspan.setAttribute('x', x);
    tspan.setAttribute('dy', i === 0 ? '0' : (fontSize + 3));
    tspan.setAttribute('y', i === 0 ? startY : '');
    if (i > 0) tspan.removeAttribute('y');
    tspan.textContent = line;
    g.appendChild(tspan);
  });
  return g;
}

const STYLES = {
  goal:        { rx: 100, ry: 58, fill: '#c4daf4', stroke: '#8badd4', sw: 2.5, dash: '6,4', fs: 12, fc: '#2a4a7a', shape: 'ellipse' },
  actor:       { rx: 78, ry: 42, fill: '#fce9a3', stroke: '#d4b84a', sw: 2.5, dash: '8,5', fs: 12, fc: '#6b5a10', shape: 'ellipse' },
  impact:      { rx: 68, ry: 38, fill: '#b8e6cc', stroke: '#6ab88e', sw: 2, dash: '4,4', fs: 12, fc: '#1a5c38', shape: 'ellipse' },
  deliverable: { w: 140, h: 48, fill: '#f8c4c4', stroke: '#c47070', sw: 2.5, fs: 12, fc: '#6b2020', shape: 'rect' },
  us:          { w: 120, h: 52, fill: '#e8dff5', stroke: '#9b85c4', sw: 1.5, fs: 10, fc: '#3d2a5c', shape: 'rect' },
};

function drawNode(node) {
  const cx = node._x, cy = node._y;
  const s = STYLES[node.type];
  const g = document.createElementNS(NS, 'g');
  g.classList.add('node-group');

  let shape;
  if (s.shape === 'ellipse') {
    shape = document.createElementNS(NS, 'path');
    shape.setAttribute('d', ellipsePath(cx, cy, s.rx, s.ry));
    shape.setAttribute('stroke-dasharray', s.dash);
  } else {
    shape = document.createElementNS(NS, 'path');
    shape.setAttribute('d', rectPath(cx - s.w/2, cy - s.h/2, s.w, s.h));
  }
  shape.setAttribute('fill', s.fill);
  shape.setAttribute('stroke', s.stroke);
  shape.setAttribute('stroke-width', s.sw);
  shape.classList.add('node-shape');
  g.appendChild(shape);
  g.appendChild(createText(cx, cy, node.label, s.fs, s.fc));

  g.addEventListener('mouseenter', () => { tooltip.textContent = node.tip; tooltip.style.opacity = '1'; });
  g.addEventListener('mousemove', (e) => { tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY - 10) + 'px'; });
  g.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });

  return g;
}

function drawConnector(x1, y1, x2, y2) {
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', connectorPath(x1, y1, x2, y2));
  path.classList.add('connector');
  return path;
}

// ─── RENDER ───

const connectorsG = document.createElementNS(NS, 'g');
const nodesG = document.createElementNS(NS, 'g');

function renderTree(node) {
  nodesG.appendChild(drawNode(node));
  if (!node.children) return;
  const parentBottom = node._y + HALF_HEIGHTS[node.type];
  node.children.forEach(child => {
    const childTop = child._y - HALF_HEIGHTS[child.type];
    connectorsG.appendChild(drawConnector(node._x, parentBottom, child._x, childTop));
    renderTree(child);
  });
}

renderTree(tree);
svg.appendChild(connectorsG);
svg.appendChild(nodesG);

const bbox = svg.getBBox();
svg.setAttribute('viewBox', `${bbox.x - 20} ${bbox.y - 20} ${bbox.width + 40} ${bbox.height + 40}`);
svg.setAttribute('width', '100%');
svg.setAttribute('height', Math.max(bbox.height + 60, 700));
</script>
